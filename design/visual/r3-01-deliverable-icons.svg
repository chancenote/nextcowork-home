<svg xmlns="http://www.w3.org/2000/svg" class="visual-deliverable-icons" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden" focusable="false">
  <!--
    산출물 7종 소형 아이콘 심볼 시트 (셀렉터 아이콘급, 24x24, currentColor).
    사용: 각 deliverable-card 상단에
      svg.deliverable-ic (viewBox 0 0 24 24, aria-hidden) 안에서 use href="#deliv-report" 참조.
    카드에 color:var(accent) 를 걸면 stroke=currentColor 로 코칭색 상속.
    stroke-width 2, round (공통 규격). 대형 도식 아님 — 스캔 보조 아이콘(텍스트 라벨 항상 병기).
  -->
  <defs>
    <g id="deliv-base" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </defs>

  <!-- 01 CEO AI Readiness 진단 리포트 : 문서 + 레벨 바 -->
  <symbol id="deliv-report" viewBox="0 0 24 24">
    <title>진단 리포트</title>
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3 h8 l4 4 v14 h-12 z"/>
      <path d="M9 17 v-2 M12 17 v-5 M15 17 v-8"/>
    </g>
  </symbol>

  <!-- 02 업무분해 매트릭스 : 2×2 격자 -->
  <symbol id="deliv-matrix" viewBox="0 0 24 24">
    <title>업무분해 매트릭스</title>
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="4" width="16" height="16" rx="2"/>
      <path d="M12 4 v16 M4 12 h16"/>
    </g>
  </symbol>

  <!-- 03 핵심 업무 Agent 플레이북 : 책 + 실행(▶) -->
  <symbol id="deliv-playbook" viewBox="0 0 24 24">
    <title>Agent 플레이북</title>
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="4" width="14" height="16" rx="2"/>
      <path d="M9 4 v16"/>
      <path d="M13 9 l4 3 l-4 3 z"/>
    </g>
  </symbol>

  <!-- 04 나만의 Notion 위키 : 지식 레이어(겹친 페이지) -->
  <symbol id="deliv-wiki" viewBox="0 0 24 24">
    <title>Notion 위키</title>
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="8" y="3" width="12" height="14" rx="2"/>
      <path d="M8 7 H5 a1 1 0 0 0 -1 1 v11 a1 1 0 0 0 1 1 h10 a1 1 0 0 0 1 -1 v-2"/>
      <path d="M11 8 h6 M11 12 h6"/>
    </g>
  </symbol>

  <!-- 05 프롬프트·스킬 노트 : 노트 + 스파클 -->
  <symbol id="deliv-note" viewBox="0 0 24 24">
    <title>프롬프트·스킬 노트</title>
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="5" width="14" height="16" rx="2"/>
      <path d="M7 10 h6 M7 13 h8 M7 16 h5"/>
      <path d="M18 3 v4 M16 5 h4"/>
    </g>
  </symbol>

  <!-- 06 사내 시연 킷 : 화면 + 실행(▶) -->
  <symbol id="deliv-demo" viewBox="0 0 24 24">
    <title>사내 시연 킷</title>
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="5" width="18" height="12" rx="2"/>
      <path d="M12 17 v3 M8 20 h8"/>
      <path d="M10 9 l4 2.5 l-4 2.5 z"/>
    </g>
  </symbol>

  <!-- 07 90일 실행 플랜 + 30일 팔로업 : 캘린더 + 체크 -->
  <symbol id="deliv-plan" viewBox="0 0 24 24">
    <title>90일 실행 플랜</title>
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="5" width="16" height="15" rx="2"/>
      <path d="M4 9 h16 M8 3 v4 M16 3 v4"/>
      <path d="M8.5 14.5 l2.5 2.5 l4.5 -4.5"/>
    </g>
  </symbol>
</svg>
